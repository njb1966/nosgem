/*
   nosgem.cfg -- mTCP configuration for NOSgem / tlstest
   Based on GLOBAL.CFG; tuned for a single outbound TCP connection.
*/

#ifndef NOSGEM_CFG_H
#define NOSGEM_CFG_H

#define PACKET_HANDLERS      (2)
#define PACKET_BUFFERS      (10)
#define PACKET_BUFFER_LEN (1514)
#define PKT_DUMP_BYTES    (1514)

#define ARP_MAX_ENTRIES      (5)
#define ARP_MAX_PENDING      (2)
#define ARP_RETRIES          (3)
#define ARP_TIMEOUT      (500ul)
#define ARP_TIMEOUT_FAST (200ul)

#define IP_MAX_FRAG_PACKETS             (4)
#define IP_MAX_FRAGS_PER_PACKET        (10)
#define IP_BIGPACKET_SIZE            (2048)
#define IP_FRAG_REASSEMBLY_TIMEOUT (4000ul)

#define ICMP_ECHO_OPT_DATA      (256)

#define TCP_MAX_SOCKETS           (1)    /* one outbound connection at a time */
#define TCP_MAX_XMIT_BUFS        (10)
#define TCP_SOCKET_RING_SIZE      (4)
#define TCP_CLOSE_TIMEOUT   (15000ul)
#define TCP_OPT_ENQUEUED_ACKS

#define UDP_MAX_CALLBACKS         (1)

#define DNS_MAX_NAME_LEN          (128)
#define DNS_MAX_DOMAIN_LEN         (50)
#define DNS_MAX_ENTRIES             (1)
#define DNS_HANDLER_PORT         (1057)
#define DNS_RECURSION_DESIRED       (1)
#define DNS_INITIAL_SEND_TIMEOUT (500ul)
#define DNS_RETRY_THRESHOLD     (2000ul)
#define DNS_TIMEOUT            (10000ul)

#define DHCP_LEASE_THRESHOLD   (3600ul)

/* Enable protocol layers -- without these, UTILS.CPP skips parsing
   NAMESERVER and other config keys from mtcp.cfg */
#define COMPILE_ARP
#define COMPILE_UDP
#define COMPILE_TCP
#define COMPILE_DNS
#define COMPILE_ICMP

#define SLEEP_CALLS

#define NOTRACE

#endif
